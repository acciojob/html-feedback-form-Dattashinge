<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="container">

    <h2>Feedback Form</h2>

    <form method="post">

      <!-- Name -->
      <label for="name">Name</label>
      <input 
        type="text"
        id="name"
        minlength="3"
        maxlength="50"
        required
      >

      <!-- Portfolio -->
      <label for="portfolio">Portfolio</label>
      <input 
        type="url"
        id="portfolio"
        required
      >

      <!-- Favorite Color -->
      <label for="favColor">Favorite Color</label>
      <input 
        type="color"
        id="favColor"
      >

      <!-- Likeness -->
      <label for="likeness">Likeness</label>
      <input 
        type="range"
        id="likeness"
        min="1"
        max="100"
      >

      <!-- Submit Button -->
      <button type="submit">Submit</button>

    </form>

  </div>

	
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
